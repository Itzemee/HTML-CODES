<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact — Relearning</title>
  <link rel="stylesheet" href="mine.css">
</head>
<body>
  <header class="site-header">
    <nav class="navbar">
      <a class="brand" href="index.html">Relearning</a>
      <button class="nav-toggle" aria-label="Toggle navigation">
        <span class="hamburger"></span>
      </button>
      <ul class="nav-list">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="blog.html">Blog</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main class="content">
    <h1>Contact</h1>
    <p>If you'd like to reach out, send an email or use the form below (demo only).</p>
    <form action="mailto:ekpommenyene102@gmail.com" method="post" enctype="text/plain">
      <label>
        Name<br>
        <input type="text" name="name" required style="width:100%;padding:.5rem;margin-top:.25rem;border:1px solid #ccc;border-radius:4px;">
      </label>
      <div style="height:.5rem"></div>
      <label>
        Message<br>
        <textarea name="message" rows="6" required style="width:100%;padding:.5rem;margin-top:.25rem;border:1px solid #ccc;border-radius:4px;"></textarea>
      </label>
      <div style="height:.75rem"></div>
      <button type="submit" style="background:#0b74de;color:#fff;border:0;padding:.6rem 1rem;border-radius:6px;cursor:pointer;">Send</button>
    </form>
  </main>

  <footer class="site-footer">
    <p>&copy; 2025 Relearning Project</p>
  </footer>

  <script>
    (function(){
      const btn = document.querySelector('.nav-toggle');
      const navList = document.querySelector('.nav-list');
      if (!btn || !navList) return;
      btn.addEventListener('click', () => navList.classList.toggle('open'));
    })();
  </script>
</body>
</html>
